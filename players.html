<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Status - Admin Only</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #0b1120; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px; 
        }
        
        /* Password Overlay */
        #password-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1120; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 15px; width: 220px; background: #0f172a; color: white; text-align: center; }
        button { padding: 10px 25px; background: #00a2ed; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }

        /* Grid System */
        h1 { margin-bottom: 40px; color: #f8fafc; text-shadow: 0 0 10px rgba(0,162,237,0.3); }
        .grid-container { 
            display: none; /* ปลดล็อคด้วยรหัสผ่าน */
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1200px; 
        }
        
        /* Player Card */
        .player-card { 
            background: #1e293b; 
            padding: 25px 15px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #334155;
            position: relative;
        }

        .player-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            object-fit: cover;
            border: 4px solid #0f172a;
            background: #2d3748;
            transition: 0.3s;
        }

        .player-name { font-size: 1.3rem; font-weight: 600; margin: 5px 0; }
        .status-text { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }

        /* --- Alive State --- */
        .alive-card { border-bottom: 6px solid #22c55e; }
        .alive-card .status-text { color: #4ade80; }
        .alive-card .status-text::before { content: "● "; }

        /* --- Dead State (เทาซีด) --- */
        .dead-card { 
            border-bottom: 6px solid #ef4444; 
            opacity: 0.5; 
        }
        .dead-card .player-img { 
            filter: grayscale(1) contrast(0.8); /* ทำให้รูปเป็นสีเทาซีด */
        }
        .dead-card .status-text { color: #f87171; }
        .dead-card .status-text::before { content: "✖ "; }

    </style>
</head>
<body>

    <div id="password-gate">
        <div class="login-box">
            <h3>🔒 ยืนยันตัวตน</h3>
            <input type="password" id="pass-input" placeholder="รหัสผ่าน">
            <br>
            <button onclick="checkPass()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="grid-container" id="player-grid">

        <div class="player-card alive-card">

    <script>
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === '1234') { 
                document.getElementById('password-gate').style.display = 'none';
                document.getElementById('player-grid').style.display = 'grid';
            } else {
                alert('รหัสไม่ถูกต้อง!');
            }
        }
    </script>
</body>
</html>
