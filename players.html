<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Status - Admin Only</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0b1120; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Password Overlay */
        #password-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1120; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
        button { padding: 10px 20px; background: #00a2ed; border: none; border-radius: 5px; color: white; cursor: pointer; }

        /* Card System */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; display: none; } /* ซ่อนไว้ก่อน */
        .player-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border-bottom: 5px solid #444; }
        .status-alive { color: #4ade80; font-weight: bold; }
        .status-dead { color: #f87171; font-weight: bold; opacity: 0.6; }
        .dead-card { opacity: 0.5; filter: grayscale(0.8); border-bottom-color: #f87171; }
        .alive-card { border-bottom-color: #4ade80; }
    </style>
</head>
<body>

    <!-- ส่วนล็อครหัส -->
    <div id="password-gate">
        <div class="login-box">
            <h3>🔒 ส่วนเฉพาะผู้ดูแล</h3>
            <input type="password" id="pass-input" placeholder="ใส่รหัสผ่าน...">
            <br>
            <button onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <h1>รายชื่อผู้เล่นทั้งหมด</h1>

    <div class="grid-container" id="player-grid">
        <!-- Mock-up 15 คน -->
        <!-- ตัวอย่าง Player 1 (Alive) -->
        <div class="player-card alive-card">
            <h3>Player 1</h3>
            <p class="status-alive">● ALIVE</p>
        </div>

        <!-- ตัวอย่าง Player 2 (Dead) -->
        <div class="player-card dead-card">
            <h3>Player 2</h3>
            <p class="status-dead">✖ DEAD</p>
        </div>

        <!-- คุณสามารถก๊อปปี้เพิ่มจนครบ 15 คนได้ที่นี่ -->
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === '1234') { // <--- เปลี่ยนรหัสตรงนี้ได้เลย
                document.getElementById('password-gate').style.display = 'none';
                document.getElementById('player-grid').style.display = 'grid';
            } else {
                alert('รหัสไม่ถูกต้อง!');
            }
        }
    </script>
</body>
</html>
