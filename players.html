<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Status List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        /* พื้นหลังแบบเคลื่อนไหว */
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px; 
            overflow-x: hidden;
            position: relative;
        }

        /* สร้าง Effect ฟุ้งๆ ด้านหลัง */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 162, 237, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
            z-index: -1;
            animation: drift 10s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        h1 { 
            margin-bottom: 40px; 
            color: #f8fafc; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            font-weight: 600;
            letter-spacing: 2px;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1200px; 
            z-index: 1;
        }
        
        /* สไตล์การ์ดแบบ Glow */
        .player-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            padding: 25px 15px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-card:hover {
            transform: translateY(-10px);
            background: rgba(30, 41, 59, 0.9);
        }

        .player-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .player-name { font-size: 1.2rem; font-weight: 600; margin: 10px 0 5px; color: #fff; }
        .status-text { font-size: 0.85rem; font-weight: bold; letter-spacing: 1.5px; }

        /* --- Alive State (เขียวเรืองแสง) --- */
        .alive-card { box-shadow: 0 0 15px rgba(34, 197, 94, 0.1); }
        .alive-card:hover { border-color: #22c55e; box-shadow: 0 0 25px rgba(34, 197, 94, 0.3); }
        .alive-card .status-text { color: #4ade80; text-shadow: 0 0 8px rgba(74, 222, 128, 0.5); }
        .alive-card .status-text::before { content: "● "; }

        /* --- Dead State (แดง/เทาซีด) --- */
        .dead-card { 
            opacity: 0.5; 
            border-color: rgba(239, 68, 68, 0.3);
        }
        .dead-card .player-img { filter: grayscale(1) brightness(0.7); border-color: #ef4444; }
        .dead-card .status-text { color: #f87171; }
        .dead-card .status-text::before { content: "✖ "; }

    </style>
</head>
<body>

    <h1>รายชื่อผู้เล่นทั้งหมด</h1>

    <div class="grid-container">
        <!-- 15 Players -->
        <div class="player-card alive-card"><img src="1.png" class="player-img"><div class="player-name">1. คีธ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="2.png" class="player-img"><div class="player-name">2. เสอเหนียน</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="3.png" class="player-img"><div class="player-name">3. คิมูระ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="4.png" class="player-img"><div class="player-name">4. สีน้ำ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="5.png" class="player-img"><div class="player-name">5. ชานหู</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="6.png" class="player-img"><div class="player-name">6. เสวียนชงหยวน</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="7.png" class="player-img"><div class="player-name">7. ชิดาเระ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="8.png" class="player-img"><div class="player-name">8. เซราลิธ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="9.png" class="player-img"><div class="player-name">9. คิมหันต์</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="10.png" class="player-img"><div class="player-name">10. ไชนี่</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="11.png" class="player-img"><div class="player-name">11. เฟิงมี่</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="12.png" class="player-img"><div class="player-name">12. อ็อคเทฟ</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="13.png" class="player-img"><div class="player-name">13. เมแกน</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="14.png" class="player-img"><div class="player-name">14. ฮุยปา</div><div class="status-text">ALIVE</div></div>
        <div class="player-card alive-card"><img src="15.png" class="player-img"><div class="player-name">15. ชื่อ</div><div class="status-text">ALIVE</div></div>
    </div>

</body>
</html>
