<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Voting System</title>
    <style>
        body { 
            font-family: 'Tahoma', sans-serif; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0f172a; /* พื้นหลังสีเข้มเพื่อให้เห็นละอองชัด */
        }

        /* --- Particle Canvas --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); /* กระจกฝ้า */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); 
            width: 350px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            color: white;
        }

        h2 { color: #38bdf8; margin-bottom: 10px; font-size: 24px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        p { color: #cbd5e1; margin-bottom: 20px; font-size: 15px; }

        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; outline: none; 
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: 0.3s;
        }

        input::placeholder { color: #94a3b8; }
        option { background: #1e293b; color: white; }

        input:focus, select:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.1);
        }

        button { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; 
        }

        .btn-vote { 
            background: #0ea5e9; color: white; 
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }

        .btn-vote:hover { 
            background: #38bdf8; transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.6);
        }

        .btn-skip { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
        .btn-skip:hover { background: rgba(255, 255, 255, 0.2); color: white; }

        .hidden { display: none; }
        .status-msg { color: #38bdf8; font-weight: bold; margin-top: 20px; font-size: 1.3rem; }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="container" id="login-section">
    <h2>🔓 ยืนยันตัวตน</h2>
    <p>กรุณากรอกชื่อตัวละครของท่าน</p>
    <input type="text" id="player-name" placeholder="ชื่อตัวละครของคุณ...">
    <button class="btn-vote" onclick="checkUser()">เข้าสู่หน้าโหวต</button>
</div>

<div class="container hidden" id="vote-section">
    <h2 id="welcome-msg">สวัสดี</h2>
    <p>ท่านต้องการโหวตให้ใคร?</p>
    <select id="vote-target">
        <option value="คีธ">คีธ</option>
        <option value="เสอเหนียน">เสอเหนียน</option>
        <option value="คิมูระ">คิมูระ</option>
        <option value="ชานหู">ชานหู</option>
        <option value="เสวียนชงหยวน">เสวียนชงหยวน</option>
        <option value="ชิดาเระ">ชิดาเระ</option>
        <option value="เซราลิธ">เซราลิธ</option>
        <option value="คิมหันต์">คิมหันต์</option>
        <option value="ไชนี่">ไชนี่</option>
        <option value="เฟิงมี่">เฟิงมี่</option>
        <option value="อ็อคเทฟ">อ็อคเทฟ</option>
        <option value="เมแกน">เมแกน</option>
        <option value="ฮุยปา">ฮุยปา</option>
        <option value="สีน้ำ">สีน้ำ</option> 
    </select>
    <button class="btn-vote" onclick="submitVote()">ลงคะแนนโหวต</button>
    <button class="btn-skip" onclick="skipVote()">ข้ามการโหวต</button>
</div>

<div class="container hidden" id="finish-section">
    <h2 class="status-msg">รับผลโหวตเอาไว้แล้ว !</h2>
    <p>เจอกันในเกมจ้า</p>
</div>

<script>
    // --- Particle Effect Script ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = `rgba(56, 189, 248, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function createParticles() {
        particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    createParticles();
    animate();
    // ------------------------------

    const allowedUsers = [
        "คีธ", "เสอเหนียน", "คิมูระ", "ชานหู", "เสวียนชงหยวน", 
        "ชิดาเระ", "เซราลิธ", "คิมหันต์", "ไชนี่", "เฟิงมี่", 
        "อ็อคเทฟ", "เมแกน", "ฮุยปา", "ชื่อ", "สีน้ำ",
        "Staff_01", "Staff_02", "Admin_Test" 
    ];

    let currentUser = "";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1zrkXG_4wTOug7VuI6hZFxX3bWTn3G4LF-SQ3Ebqnn35Ye5YyoKJRNiJp-c7sZsFlCw/exec";

    function checkUser() {
        const nameInput = document.getElementById('player-name').value.trim();
        if (allowedUsers.includes(nameInput)) {
            currentUser = nameInput;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('vote-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "สวัสดีท่าน " + currentUser;
        } else {
            alert("ขออภัย ไม่พบชื่อ '" + nameInput + "' ในระบบ");
        }
    }

    function submitVote() {
        const target = document.getElementById('vote-target').value;
        sendData(currentUser, target);
    }

    function skipVote() {
        sendData(currentUser, "ข้ามการโหวต");
    }

    function sendData(voter, voteFor) {
        document.getElementById('vote-section').classList.add('hidden');
        document.getElementById('finish-section').classList.remove('hidden');

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ voter: voter, voteFor: voteFor })
        });
    }
</script>

</body>
</html>
